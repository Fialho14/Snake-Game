<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="shell">

  <div id="topbar">
    <span id="title">Snake</span>
    <div id="btn-group">
      <button class="toggle-btn" id="btn-sound">🔇</button>
      <button class="toggle-btn" id="btn-theme">🌙</button>
      <button class="toggle-btn" id="btn-ai">AI</button>
      <button class="toggle-btn" id="btn-wrap">Wrap</button>
    </div>
  </div>

  <div id="stats">
    <div class="pill">
      <span class="pill-label">Score</span>
      <span class="pill-value" id="score">0</span>
    </div>
    <div class="pill">
      <span class="pill-label">Best</span>
      <span class="pill-value" id="best">0</span>
    </div>
    <div class="pill">
      <span class="pill-label">Level</span>
      <span class="pill-value" id="level">1</span>
    </div>
  </div>

  <div id="speed-control">
    <button class="seg" data-s="slow">Slow</button>
    <button class="seg active" data-s="normal">Normal</button>
    <button class="seg" data-s="fast">Fast</button>
  </div>

  <div id="canvas-wrapper">
    <canvas id="canvas"></canvas>
    <div id="overlay">
      <div id="overlay-icon">🐍</div>
      <div id="overlay-title">Snake</div>
      <div id="overlay-sub">Use arrow keys or WASD to move</div>
      <div id="btn-row"><button id="btn-play">Play</button></div>
    </div>
  </div>

  <div id="hint">
    <kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd> or
    <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> &nbsp;·&nbsp;
    <kbd>Space</kbd> pause
  </div>

</div>

<script src="ai.js"></script>
<script src="game.js"></script>
</body>
</html>
